name: Compare asm

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pull-requests: write

jobs:
  compare-asm:
    name: compare asm
    runs-on: ubuntu-latest
    concurrency:
      group: asm-compare-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-show-asm
        run: cargo install cargo-show-asm --locked

      - name: Run asm comparison
        id: compare
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          python3 scripts/compare_asm_against_ref.py \
            --git-ref "$BASE_SHA" \
            --summary-only \
            > asm-compare-report.txt
          status=$?
          set -e

          cat asm-compare-report.txt

          case "$status" in
            0|1) ;;
            *) exit "$status" ;;
          esac

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload asm comparison report
        uses: actions/upload-artifact@v4
        with:
          name: asm-compare-report
          path: asm-compare-report.txt

      - name: Add pull request comment
        uses: actions/github-script@v7
        env:
          COMPARE_STATUS: ${{ steps.compare.outputs.status }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- compare-asm -->";
            const report = fs.readFileSync("asm-compare-report.txt", "utf8").trimEnd();
            const status = process.env.COMPARE_STATUS;
            const baseSha = process.env.BASE_SHA;
            const headSha = process.env.HEAD_SHA;
            const headline = status === "0"
              ? "No asm differences detected."
              : "Asm differences detected.";

            const body = [
              marker,
              "## Asm comparison",
              "",
              headline,
              "",
              "Compared this pull request branch head against its base commit with `./scripts/compare_asm_against_ref.py`.",
              `Compared commits: ${baseSha} -> ${headSha}`,
              "",
              "```text",
              report,
              "```",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
